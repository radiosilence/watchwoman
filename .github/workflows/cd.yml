name: CD

# Fires whenever CI finishes on main.  We gate publishing on the
# workspace version having strictly moved past the latest GitHub
# release — no rebuild, we just consume the tarballs CI already
# produced.  Artifacts from the triggering CI run are fetched
# cross-workflow via `actions/download-artifact`'s `run-id` mode.
#
# PRs never reach CD because `workflow_run` only fires for the
# default branch, and `check-version` gates on that anyway.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success'
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      major: ${{ steps.check.outputs.major }}
      major_minor: ${{ steps.check.outputs.major_minor }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Check out the commit CI actually built, not the tip of
          # main at the time this workflow fires — avoids a race when
          # someone pushes twice in quick succession.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Compare workspace version to latest release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CURRENT=$(grep -E '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Workspace version: $CURRENT"

          # Releases API is the source of truth; tags can be force-pushed.
          LATEST_RELEASE=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          LATEST=${LATEST_RELEASE#v}
          echo "Latest release:    ${LATEST:-<none>}"

          should_release=false
          if [ -z "$LATEST" ]; then
            should_release=true
          else
            # Strict greater-than using `sort -V`.  If `LATEST` doesn't
            # come before `CURRENT` in version order, don't release.
            # Prevents downgrades and no-op re-releases.
            if [ "$(printf '%s\n%s\n' "$LATEST" "$CURRENT" | sort -V | head -1)" = "$LATEST" ] \
                && [ "$LATEST" != "$CURRENT" ]; then
              should_release=true
            fi
          fi

          if [ "$should_release" = "true" ]; then
            echo "Version moved: ${LATEST:-<none>} -> $CURRENT"
          else
            echo "Version unchanged or not strictly greater — no release."
          fi

          {
            echo "should_release=${should_release}"
            echo "version=${CURRENT}"
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            echo "major=${MAJOR}"
            echo "major_minor=${MAJOR}.${MINOR}"
          } >> "$GITHUB_OUTPUT"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [check-version]
    if: needs.check-version.outputs.should_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Cross-workflow artifact download: pulls straight from the CI
      # run that triggered us.  No rebuild.
      - name: Download CI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: watchwoman-*
          path: artifacts

      - name: Stage release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.sha256' \) \
            -exec cp {} release/ \;
          ls -la release/
          # Sanity-check: six platforms × (tar.gz + sha256) = 12 files.
          count=$(find release -type f | wc -l | tr -d ' ')
          if [ "$count" -lt 12 ]; then
            echo "expected >=12 release files, got $count — aborting" >&2
            exit 1
          fi

      - name: Create or update tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ needs.check-version.outputs.version }}"
          git tag -f -a "${TAG}" -m "Release ${TAG}" ${{ github.event.workflow_run.head_sha }}
          git push -f origin "${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [check-version, create-release]
    if: needs.check-version.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_TOKEN secret is not set; skipping crates.io publish." \
              >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Dependency order: protocol first (no deps), then watchwoman.
          # watchwoman-tests has publish = false.  --no-verify because
          # CI already built and tested this exact commit.
          cargo publish -p watchwoman-protocol --no-verify || {
            echo "protocol publish failed — likely already on crates.io; continuing"
          }
          # crates.io indexer lag — wait for protocol to be fetchable
          # before publishing a crate that depends on it.
          for i in 1 2 3 4 5; do
            if cargo search watchwoman-protocol 2>/dev/null \
                | grep -q "^watchwoman-protocol"; then
              break
            fi
            sleep 15
          done
          cargo publish -p watchwoman --no-verify

  update-homebrew-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: [check-version, create-release]
    if: needs.check-version.outputs.should_release == 'true'
    steps:
      - name: Check tap token
        id: gate
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set; skipping tap update." \
              >> "$GITHUB_STEP_SUMMARY"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tap
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: radiosilence/homebrew-watchwoman
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      # Same cross-workflow grab as `create-release` — reuse the
      # tarballs from the CI run that brought us here rather than
      # re-downloading from the release page (which would race the
      # release API).
      - name: Download CI artifacts
        if: steps.gate.outputs.skip != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: watchwoman-*
          path: artifacts

      - name: Collect sha256s and regenerate formula
        if: steps.gate.outputs.skip != 'true'
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          set -euo pipefail
          declare -A SHAS
          for f in $(find artifacts -name '*.tar.gz.sha256' -type f); do
            tar_name=$(basename "$f" .sha256)
            sha=$(awk '{print $1}' "$f")
            SHAS["$tar_name"]=$sha
          done
          must() {
            local key="$1"
            local val="${SHAS[$key]:-}"
            if [ -z "$val" ]; then
              echo "missing sha256 for $key" >&2
              exit 1
            fi
            echo "$val"
          }
          # Target tarball naming matches ci.yml build.Package.NAME.
          MACOS_ARM_SHA=$(must "watchwoman-${VERSION}-aarch64-apple-darwin.tar.gz")
          MACOS_AMD_SHA=$(must "watchwoman-${VERSION}-x86_64-apple-darwin.tar.gz")
          LINUX_ARM_SHA=$(must "watchwoman-${VERSION}-aarch64-unknown-linux-gnu.tar.gz")
          LINUX_AMD_SHA=$(must "watchwoman-${VERSION}-x86_64-unknown-linux-gnu.tar.gz")

          URL_BASE="https://github.com/radiosilence/watchwoman/releases/download/v${VERSION}"

          cat > tap/Formula/watchwoman.rb <<EOF
          class Watchwoman < Formula
            desc "Drop-in watchman replacement that doesn't eat your RAM"
            homepage "https://github.com/radiosilence/watchwoman"
            version "${VERSION}"
            license any_of: ["MIT", "Apache-2.0"]

            on_macos do
              if Hardware::CPU.arm?
                url "${URL_BASE}/watchwoman-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${MACOS_ARM_SHA}"
              else
                url "${URL_BASE}/watchwoman-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${MACOS_AMD_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${URL_BASE}/watchwoman-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM_SHA}"
              else
                url "${URL_BASE}/watchwoman-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_AMD_SHA}"
              end
            end

            def install
              %w[watchwoman watchman watchman-wait watchman-make watchman-diag watchmanctl].each do |b|
                bin.install b
              end
            end

            def caveats
              <<~EOS
                watchwoman ships a \`watchman\` binary for drop-in compatibility.
                If you previously installed facebook/fb's watchman, uninstall it
                and make sure #{HOMEBREW_PREFIX}/bin comes first on your PATH:

                  brew uninstall --ignore-dependencies watchman || true
                  which watchman   # should resolve to #{HOMEBREW_PREFIX}/bin/watchman

                See https://github.com/radiosilence/watchwoman/blob/main/docs/REPLACING_WATCHMAN.md
              EOS
            end

            test do
              assert_match "watchwoman", shell_output("#{bin}/watchwoman --version")
              assert_match "watchwoman", shell_output("#{bin}/watchman --version")
            end
          end
          EOF

      - name: Commit and push formula
        if: steps.gate.outputs.skip != 'true'
        working-directory: tap
        run: |
          set -euo pipefail
          if git diff --quiet Formula/watchwoman.rb; then
            echo "Formula already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/watchwoman.rb
          git commit -m "watchwoman ${{ needs.check-version.outputs.version }}"
          git push
