name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run tests
        run: cargo test --workspace --all-features

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Lint with Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  format:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    needs: [test, lint, format]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      major: ${{ steps.check.outputs.major }}
      major_minor: ${{ steps.check.outputs.major_minor }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check if version changed
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Workspace version lives in the root Cargo.toml under
          # [workspace.package]; all member crates inherit it.
          CURRENT_VERSION=$(grep -E '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Current version: $CURRENT_VERSION"

          # Tags are a side-effect of releases; use the releases API as
          # the source of truth so deleted tags don't accidentally
          # re-trigger a build.
          LATEST_RELEASE=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          LATEST_VERSION=${LATEST_RELEASE#v}
          echo "Latest release: ${LATEST_VERSION:-<none>}"

          if [ -z "$LATEST_RELEASE" ] || [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "Version changed: ${LATEST_VERSION:-<none>} -> $CURRENT_VERSION"
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged"
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

          echo "version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT
          echo "major_minor=${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT

  build-binaries:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: [check-version]
    if: needs.check-version.outputs.should_release == 'true'
    # Windows is intentionally absent: watchwoman is built on unix
    # sockets + nix-flavoured syscalls (setsid, inotify/FSEvents,
    # passwd lookup).  A proper Windows port needs named pipes and a
    # different watcher backend — tracked separately, not blocked on
    # this pipeline.
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - { os: macos-latest, target: aarch64-apple-darwin,     platform: macos-arm64 }
          - { os: macos-13,     target: x86_64-apple-darwin,      platform: macos-amd64 }
          # Linux (glibc) — dynamic
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-gnu,  platform: linux-amd64-gnu  }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, platform: linux-arm64-gnu  }
          # Linux (musl) — static, portable across distros
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-musl, platform: linux-amd64-musl }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-musl, platform: linux-arm64-musl }
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install musl toolchain
        if: endsWith(matrix.target, '-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --bin watchwoman --bin watchman

      - name: Package
        id: package
        shell: bash
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          NAME="watchwoman-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${NAME}"
          cp "target/${{ matrix.target }}/release/watchwoman" "dist/${NAME}/"
          cp "target/${{ matrix.target }}/release/watchman" "dist/${NAME}/"
          cp README.md CHANGELOG.md LICENSE* "dist/${NAME}/" 2>/dev/null || true
          tar -czf "dist/${NAME}.tar.gz" -C dist "${NAME}"
          (cd dist && shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256")
          echo "artifact=dist/${NAME}.tar.gz" >> $GITHUB_OUTPUT
          echo "checksum=dist/${NAME}.tar.gz.sha256" >> $GITHUB_OUTPUT

      - name: Upload tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: watchwoman-${{ needs.check-version.outputs.version }}-${{ matrix.platform }}
          path: |
            ${{ steps.package.outputs.artifact }}
            ${{ steps.package.outputs.checksum }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [check-version, build-binaries]
    if: needs.check-version.outputs.should_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Stage release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.sha256' \) \
            -exec cp {} release/ \;
          ls -la release/

      - name: Create or update tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ needs.check-version.outputs.version }}"
          # Tags are documentation, not gating — upsert, don't fail on
          # re-push.  The release API is the source of truth.
          git tag -f -a "${TAG}" -m "Release ${TAG}"
          git push -f origin "${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [check-version, create-release]
    if: needs.check-version.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_TOKEN secret is not set; skipping crates.io publish." \
              >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          # Dependency order: protocol first (no deps), then watchwoman.
          # watchwoman-tests has publish = false.  --no-verify because
          # the crate already passed tests two jobs back.
          cargo publish -p watchwoman-protocol --no-verify || {
            echo "protocol publish failed — likely already on crates.io; continuing"
          }
          # crates.io indexer lag — wait for protocol to be fetchable
          # before publishing a crate that depends on it.
          for i in 1 2 3 4 5; do
            if cargo search watchwoman-protocol 2>/dev/null \
                | grep -q "^watchwoman-protocol"; then
              break
            fi
            sleep 15
          done
          cargo publish -p watchwoman --no-verify

  update-homebrew-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: [check-version, create-release]
    if: needs.check-version.outputs.should_release == 'true'
    steps:
      - name: Check tap token
        id: gate
        run: |
          if [ -z "${{ secrets.HOMEBREW_TAP_TOKEN }}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set; skipping tap update." \
              >> $GITHUB_STEP_SUMMARY
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout tap
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: radiosilence/homebrew-watchwoman
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download artifacts
        if: steps.gate.outputs.skip != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Collect sha256s and regenerate formula
        if: steps.gate.outputs.skip != 'true'
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          set -euo pipefail
          declare -A SHAS
          for f in $(find artifacts -name '*.tar.gz.sha256' -type f); do
            tar_name=$(basename "$f" .sha256)
            sha=$(awk '{print $1}' "$f")
            SHAS["$tar_name"]=$sha
          done
          must() {
            local key="$1"
            local val="${SHAS[$key]:-}"
            if [ -z "$val" ]; then
              echo "missing sha256 for $key" >&2
              exit 1
            fi
            echo "$val"
          }
          # Target tarball naming matches build-binaries.Package.NAME.
          MACOS_ARM_SHA=$(must "watchwoman-${VERSION}-aarch64-apple-darwin.tar.gz")
          MACOS_AMD_SHA=$(must "watchwoman-${VERSION}-x86_64-apple-darwin.tar.gz")
          LINUX_ARM_SHA=$(must "watchwoman-${VERSION}-aarch64-unknown-linux-gnu.tar.gz")
          LINUX_AMD_SHA=$(must "watchwoman-${VERSION}-x86_64-unknown-linux-gnu.tar.gz")

          URL_BASE="https://github.com/radiosilence/watchwoman/releases/download/v${VERSION}"

          cat > tap/Formula/watchwoman.rb <<EOF
          class Watchwoman < Formula
            desc "Drop-in watchman replacement that doesn't eat your RAM"
            homepage "https://github.com/radiosilence/watchwoman"
            version "${VERSION}"
            license any_of: ["MIT", "Apache-2.0"]

            on_macos do
              if Hardware::CPU.arm?
                url "${URL_BASE}/watchwoman-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${MACOS_ARM_SHA}"
              else
                url "${URL_BASE}/watchwoman-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${MACOS_AMD_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${URL_BASE}/watchwoman-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM_SHA}"
              else
                url "${URL_BASE}/watchwoman-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_AMD_SHA}"
              end
            end

            def install
              bin.install "watchwoman"
              bin.install "watchman"
            end

            def caveats
              <<~EOS
                watchwoman ships a \`watchman\` binary for drop-in compatibility.
                If you previously installed facebook/fb's watchman, uninstall it
                and make sure #{HOMEBREW_PREFIX}/bin comes first on your PATH:

                  brew uninstall --ignore-dependencies watchman || true
                  which watchman   # should resolve to #{HOMEBREW_PREFIX}/bin/watchman

                See https://github.com/radiosilence/watchwoman/blob/main/docs/REPLACING_WATCHMAN.md
              EOS
            end

            test do
              assert_match "watchwoman", shell_output("#{bin}/watchwoman --version")
              assert_match "watchwoman", shell_output("#{bin}/watchman --version")
            end
          end
          EOF

      - name: Commit and push formula
        if: steps.gate.outputs.skip != 'true'
        working-directory: tap
        run: |
          set -euo pipefail
          if git diff --quiet Formula/watchwoman.rb; then
            echo "Formula already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/watchwoman.rb
          git commit -m "watchwoman ${{ needs.check-version.outputs.version }}"
          git push
